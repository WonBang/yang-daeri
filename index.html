<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양대리 키우기</title>
<style>
:root{
  --bg:#1b2431;          /* 야근 중 사무실 창밖 */
  --panel:#f6f7f4;       /* 형광등 아래 서류 */
  --ink:#22293a;
  --line:#d8dbd3;
  --stamp:#c8372d;       /* 결재 도장 빨강 */
  --postit:#ffd94a;      /* 포스트잇 */
  --term:#2ecc71;        /* 터미널 그린 */
  --dim:#8a91a3;
  --danger:#e05545;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  background-image:
    repeating-linear-gradient(90deg,transparent 0 118px,rgba(255,255,255,.025) 118px 120px),
    repeating-linear-gradient(0deg,transparent 0 78px,rgba(255,255,255,.02) 78px 80px);
  font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
  color:var(--ink);
  display:flex;justify-content:center;
  padding:16px;
}
.mono{font-family:"SF Mono","D2Coding",Menlo,Consolas,monospace}
#app{width:100%;max-width:760px}
.screen{display:none}
.screen.on{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- 공용 패널 ---------- */
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.45);
  overflow:hidden;
}
.panel-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--line);
  background:#ecefe8;
  font-size:12px;color:var(--dim);letter-spacing:.06em;
}
.panel-head .dot{width:9px;height:9px;border-radius:50%;background:#c7ccc0}
.panel-head .dot.r{background:#e07a72}.panel-head .dot.y{background:#e6c454}.panel-head .dot.g{background:#7fbf7a}
.panel-body{padding:20px}
button{
  font:inherit;cursor:pointer;border:1px solid var(--ink);
  background:var(--panel);color:var(--ink);
  padding:11px 16px;border-radius:6px;
  transition:transform .06s ease, background .12s;
  text-align:left;width:100%;
}
button:hover{background:var(--postit)}
button:active{transform:scale(.985)}
button:focus-visible{outline:3px solid var(--stamp);outline-offset:2px}
button.primary{background:var(--ink);color:#fff;text-align:center}
button.primary:hover{background:#3a4460}
button:disabled{opacity:.4;cursor:not-allowed}
button:disabled:hover{background:var(--panel)}

/* ---------- 타이틀 ---------- */
.title-hero{padding:44px 28px 28px;text-align:center}
.title-eyebrow{font-size:12px;letter-spacing:.35em;color:var(--dim)}
h1.game-title{
  font-size:clamp(40px,9vw,64px);font-weight:900;letter-spacing:-.02em;
  margin:10px 0 4px;
}
h1.game-title .stamp{
  display:inline-block;color:var(--stamp);
  border:3px solid var(--stamp);border-radius:8px;
  padding:0 10px;transform:rotate(-4deg);
}
.title-sub{color:var(--dim);font-size:14px;margin-bottom:26px}
.title-btns{display:grid;gap:10px;max-width:340px;margin:0 auto}
.title-foot{margin-top:22px;font-size:12px;color:var(--dim)}

/* ---------- 게임 화면 ---------- */
.hud{display:grid;grid-template-columns:230px 1fr;gap:14px;margin-bottom:14px}
@media (max-width:640px){.hud{grid-template-columns:1fr}}

/* 사원증 */
.badge{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.45);
  padding:14px;text-align:center;position:relative;
}
.badge::before{ /* 목걸이 줄 구멍 */
  content:"";display:block;width:34px;height:8px;border-radius:4px;
  background:var(--bg);margin:0 auto 10px;
}
.badge .co{font-size:10px;letter-spacing:.25em;color:var(--dim)}
.badge .face-wrap{width:120px;height:120px;margin:8px auto;background:#e8ebe4;border-radius:8px;border:1px solid var(--line)}
.badge .nm{font-weight:800;font-size:18px}
.badge .grade{font-size:12px;color:var(--stamp);font-weight:700}
.badge .day{font-size:11px;color:var(--dim);margin-top:6px}

/* 캐릭터 SVG 표정 */
.face .mouth-happy,.face .mouth-tired,.face .mouth-dead,.face .mouth-drunk,
.face .eye-dead,.face .eye-happy,.face .blush{display:none}
.face.happy .mouth-norm{display:none}.face.happy .mouth-happy,.face.happy .eye-happy{display:inline}
.face.happy .eye-norm{display:none}
.face.tired .mouth-norm{display:none}.face.tired .mouth-tired{display:inline}
.face.dead .mouth-norm,.face.dead .eye-norm{display:none}
.face.dead .mouth-dead,.face.dead .eye-dead{display:inline}
.face.drunk .mouth-norm{display:none}.face.drunk .mouth-drunk,.face.drunk .blush{display:inline}

/* 스탯 = 그룹웨어 대시보드 */
.stats{padding:12px 14px;display:grid;gap:7px}
.stat{display:grid;grid-template-columns:64px 1fr 44px;align-items:center;gap:8px;font-size:12px}
.stat .lb{color:var(--dim)}
.stat .bar{height:10px;background:#e3e6de;border-radius:5px;overflow:hidden}
.stat .fill{display:block;height:100%;background:var(--term);border-radius:5px;transition:width .3s ease, background .3s}
.stat .fill.warn{background:#e6a93a}.stat .fill.crit{background:var(--danger)}
.stat .vl{text-align:right;font-weight:700}
.stat.money .vl{color:var(--ink)}
.stat .vl.minus{color:var(--danger)}

/* 이벤트 카드 */
.ev-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:10px}
.ev-tag{color:var(--stamp);font-weight:700}
.ev-text{font-size:16px;line-height:1.65;white-space:pre-line;margin-bottom:18px}
.choices{display:grid;gap:9px}
.fx-log{
  margin-top:16px;padding:12px 14px;border-radius:6px;
  background:#12241a;color:var(--term);font-size:13px;line-height:1.7;white-space:pre-line;
}
.fx-log .msg{color:#cfe8d8}

/* ---------- 엔딩 ---------- */
.ending-body{padding:34px 26px;text-align:center}
.ending-kind{font-size:12px;letter-spacing:.3em;color:var(--dim)}
.ending-title{font-size:30px;font-weight:900;margin:12px 0}
.ending-title.happy{color:#1e7a45}.ending-title.sad{color:#456}.ending-title.byung{color:var(--stamp)}
.ending-epi{white-space:pre-line;line-height:1.8;margin:18px auto 26px;max-width:520px;text-align:left;font-size:15px}
.ending-new{display:inline-block;background:var(--postit);padding:3px 10px;border-radius:4px;font-size:12px;font-weight:700;transform:rotate(-2deg)}
.ending-btns{display:grid;gap:10px;max-width:320px;margin:0 auto}

/* ---------- 도감 ---------- */
.dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:18px}
.dex-item{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}
.dex-item.locked{background:#e7eae2;color:var(--dim)}
.dex-item .k{font-size:11px;letter-spacing:.15em}
.dex-item .t{font-weight:800;margin-top:4px}
.dex-back{padding:0 18px 18px}

/* ---------- 메신저형 ---------- */
.chat{display:grid;gap:8px;margin-bottom:16px}
.bubble{max-width:78%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.55;white-space:pre-line;background:#e9edf5;border-top-left-radius:4px;justify-self:start}
.bubble .who{font-size:11px;color:var(--dim);margin-bottom:3px;font-weight:700}
.bubble .typing{color:var(--dim);letter-spacing:3px}
/* ---------- 긴급 장애형 ---------- */
.alert-card{animation:alertbg 1s steps(2) infinite}
@keyframes alertbg{0%{box-shadow:0 12px 40px rgba(0,0,0,.45)}50%{box-shadow:0 12px 40px rgba(0,0,0,.45),inset 0 0 0 3px var(--danger)}}
.alert-timer{height:8px;background:#e3e6de;border-radius:4px;overflow:hidden;margin-bottom:12px}
.alert-timer .tfill{display:block;height:100%;background:var(--danger);width:100%;transition:width 1s linear}
.alert-head{font-size:13px;color:var(--danger);font-weight:800}
.alert-count{font-weight:800}
/* ---------- 타이밍 미니게임 ---------- */
.gauge{position:relative;height:28px;background:#e3e6de;border-radius:14px;overflow:hidden;margin:16px 0 6px}
.gauge .zone{position:absolute;top:0;bottom:0}
.gauge .zone.good{background:#f0d9a0}
.gauge .zone.perfect{background:var(--term)}
.gauge .needle{position:absolute;top:-2px;bottom:-2px;width:4px;background:var(--stamp);border-radius:2px}
.gauge-hint{font-size:11px;color:var(--dim);margin-bottom:12px}
/* ---------- 주간 흐름 로그 ---------- */
.week-log{margin-top:12px;padding-top:10px;border-top:1px dashed #2e5340;font-size:12px;color:#7fae90;line-height:2}
.week-log div{opacity:0;animation:fadein .45s ease forwards}
</style>
</head>
<body>
<div id="app">

  <!-- 타이틀 -->
  <section class="screen on" id="scr-title">
    <div class="panel">
      <div class="panel-head"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="mono">(주)태평양시스템즈 그룹웨어 v3.6 — 접속자: 양대리</span></div>
      <div class="title-hero">
        <div class="title-eyebrow mono">EMPLOYEE SIMULATION</div>
        <h1 class="game-title">양대리 <span class="stamp">키우기</span></h1>
        <p class="title-sub">IT 개발자 양대리. 3년(144주)을 버티고 승진하라.<br>단, 잘못된 선택은 사망으로 이어질 수 있음. 진짜로.</p>
        <div class="title-btns">
          <button class="primary" id="btn-new">신규 입사 (새 게임)</button>
          <button id="btn-continue">이어하기</button>
          <button id="btn-dex">엔딩 도감 <span id="dex-count" class="mono"></span></button>
        </div>
        <p class="title-foot mono">stat==0 → 사망 또는 그에 준하는 것</p>
      </div>
    </div>
  </section>

  <!-- 게임 -->
  <section class="screen" id="scr-game">
    <div class="hud">
      <div class="badge">
        <div class="co">PACIFIC SYSTEMS CO.</div>
        <div class="face-wrap">
          <svg class="face" id="face" viewBox="0 0 120 120" aria-hidden="true">
            <rect x="30" y="18" width="60" height="26" rx="10" fill="#2b2b2b"/>
            <circle cx="60" cy="62" r="34" fill="#f2d3b3"/>
            <rect x="28" y="26" width="64" height="18" rx="9" fill="#2b2b2b"/>
            <!-- 안경 -->
            <circle cx="47" cy="60" r="10" fill="none" stroke="#333" stroke-width="2.5"/>
            <circle cx="73" cy="60" r="10" fill="none" stroke="#333" stroke-width="2.5"/>
            <line x1="57" y1="60" x2="63" y2="60" stroke="#333" stroke-width="2.5"/>
            <!-- 눈 -->
            <g class="eye-norm"><circle cx="47" cy="60" r="3" fill="#222"/><circle cx="73" cy="60" r="3" fill="#222"/></g>
            <g class="eye-happy"><path d="M43 60 q4 -5 8 0" stroke="#222" stroke-width="2.5" fill="none"/><path d="M69 60 q4 -5 8 0" stroke="#222" stroke-width="2.5" fill="none"/></g>
            <g class="eye-dead"><path d="M43 56 l8 8 M51 56 l-8 8" stroke="#222" stroke-width="2"/><path d="M69 56 l8 8 M77 56 l-8 8" stroke="#222" stroke-width="2"/></g>
            <g class="blush"><circle cx="42" cy="72" r="5" fill="#e88" opacity=".6"/><circle cx="78" cy="72" r="5" fill="#e88" opacity=".6"/></g>
            <!-- 입 -->
            <path class="mouth-norm" d="M53 80 h14" stroke="#a06" stroke-width="2.5" fill="none"/>
            <path class="mouth-happy" d="M52 78 q8 8 16 0" stroke="#a06" stroke-width="2.5" fill="none"/>
            <path class="mouth-tired" d="M53 82 q7 -5 14 0" stroke="#a06" stroke-width="2.5" fill="none"/>
            <path class="mouth-dead" d="M52 80 q4 4 8 0 q4 -4 8 0" stroke="#a06" stroke-width="2.5" fill="none"/>
            <path class="mouth-drunk" d="M52 78 q4 6 8 0 q4 6 8 0" stroke="#a06" stroke-width="2.5" fill="none"/>
          </svg>
        </div>
        <div class="nm">양 대 리</div>
        <div class="grade" id="ui-grade">개발1팀 · 대리</div>
        <div class="day mono" id="ui-date">1년차 1월 1주</div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="mono">HR 대시보드 — 실시간 인사정보</span></div>
        <div class="stats" id="ui-stats"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="mono" id="ev-head">이번 주 업무</span></div>
      <div class="panel-body">
        <div class="ev-meta"><span class="ev-tag" id="ev-tag"></span><span class="mono" id="ev-turn"></span></div>
        <div class="ev-text" id="ev-text"></div>
        <div class="choices" id="ev-choices"></div>
        <div class="fx-log" id="fx-log" style="display:none"></div>
      </div>
    </div>
  </section>

  <!-- 엔딩 -->
  <section class="screen" id="scr-ending">
    <div class="panel">
      <div class="panel-head"><span class="mono">인사발령 통보</span></div>
      <div class="ending-body">
        <div class="ending-kind mono" id="end-kind"></div>
        <div class="ending-title" id="end-title"></div>
        <div id="end-new"></div>
        <div class="ending-epi" id="end-epi"></div>
        <div class="ending-btns">
          <button class="primary" id="btn-retry">재입사 (다시하기)</button>
          <button id="btn-to-title">타이틀로</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 도감 -->
  <section class="screen" id="scr-dex">
    <div class="panel">
      <div class="panel-head"><span class="mono" id="dex-head">엔딩 도감</span></div>
      <div class="dex-grid" id="dex-grid"></div>
      <div class="dex-back"><button id="btn-dex-back">타이틀로</button></div>
    </div>
  </section>

</div>

<script>
"use strict";
/* =====================================================
   양대리 키우기 — 엔진
   ===================================================== */
const SAVE_KEY="yangdaeri_save", DEX_KEY="yangdaeri_endings";
const TOTAL_TURNS=144; // 36개월 x 4주
const STAT_DEF=[
  ["mental","멘탈"],["health","체력"],["boss","상사호감"],
  ["skill","개발력"],["rep","사내평판"],["liver","간 수치"]
];

let S=null; // 게임 상태

function newState(){
  return {
    turn:0, grade:"대리", promoFail:0,
    stats:{mental:70,health:70,boss:50,skill:50,rep:50,liver:80,money:300},
    flags:{}, chainQueue:[], recentEvents:[], minusStreak:0
  };
}
const cal=t=>{const m=Math.floor(t/4);return{year:Math.floor(m/12)+1,month:m%12+1,week:t%4+1};};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- 저장 ---------- */
const save=()=>localStorage.setItem(SAVE_KEY,JSON.stringify(S));
const clearSave=()=>localStorage.removeItem(SAVE_KEY);
const loadSave=()=>{try{return JSON.parse(localStorage.getItem(SAVE_KEY));}catch(e){return null;}};
const getDex=()=>{try{return JSON.parse(localStorage.getItem(DEX_KEY))||[];}catch(e){return[];}};
const addDex=id=>{const d=getDex();if(!d.includes(id)){d.push(id);localStorage.setItem(DEX_KEY,JSON.stringify(d));return true;}return false;};

/* =====================================================
   엔딩 정의
   ===================================================== */
const ENDINGS=[
 {id:"promo",kind:"happy",title:"양과장의 탄생",
  epi:"인사평가 S등급. 발령장에 '과장 양○○'이라는 글자가 찍혔다.\n부장이 어깨를 두드렸다. \"이제 자네도 관리자야.\"\n양과장은 웃었다. 코딩할 시간이 사라진다는 뜻인 줄은 아직 모른 채.\n\n— HAPPY ENDING: 하지만 이것은 또 다른 지옥의 시작이었다."},
 {id:"pangyo",kind:"happy",title:"판교행 신분당선",
  epi:"연봉 1.5배, 자율출퇴근, 맥북 M4 지급.\n양대리는 사직서를 부장 책상에 올려놓고 우아하게 퇴장했다.\n판교 사옥 로비에서 무료 콜드브루를 뽑으며 그는 생각했다.\n'여기도 3년 뒤엔 똑같겠지... 하지만 연봉이 1.5배다.'\n\n— HAPPY ENDING: 개발자의 승리."},
 {id:"sidepj",kind:"happy",title:"사이드 프로젝트 대박",
  epi:"퇴근 후 몰래 만들던 '점심메뉴 룰렛 앱'이 앱스토어 1위를 찍었다.\n월 수익이 연봉을 넘던 날, 양대리는 슬랙에 마지막 메시지를 남겼다.\n\"오늘 배포는 제가 안 합니다. 영원히.\"\n\n— HAPPY ENDING: 전설의 1인 개발자."},
 {id:"burnout",kind:"sad",title:"번아웃",
  epi:"어느 아침, 양대리는 IDE를 켰지만 아무 키도 누를 수 없었다.\n중괄호가 전부 자신을 비웃는 입처럼 보였다.\n의사는 말했다. \"당분간 코드를 보지 마세요.\"\n양대리는 시골로 내려가 감자를 심었다. 감자는 컴파일 에러가 없었다.\n\n— SAD ENDING: 멘탈이 0이 되었다."},
 {id:"karoshi",kind:"sad",title:"과로사",
  epi:"새벽 4시, 모니터에는 'Deploy Success'가 떠 있었다.\n양대리는 의자에 앉은 채 조용히 눈을 감았다.\n장례식장에서 부장이 말했다. \"참 성실한 친구였는데...\"\n그리고 조용히 덧붙였다. \"근데 내일 배포 누가 하지?\"\n\n— SAD ENDING: 체력이 0이 되었다."},
 {id:"fired",kind:"sad",title:"권고사직",
  epi:"인사팀 면담실. 테이블 위에 서류 한 장.\n\"회사 사정이... 양대리님도 아시다시피...\"\n박스에 짐을 담아 나오는 길, 경비 아저씨만이 인사를 받아줬다.\n\n— SAD ENDING: 회사에서 버려졌다."},
 {id:"bankrupt",kind:"sad",title:"신용불량 개발자",
  epi:"마이너스 통장이 한계에 도달했다.\n월급날이 와도 스치기만 할 뿐 잔고는 늘 붉은색.\n양대리는 회사 탕비실 커피믹스로 하루 세 끼를 버티다\n결국 고향으로 내려갔다.\n\n— SAD ENDING: 잔고가 회복 불가능해졌다."},
 {id:"liver",kind:"byung",title:"회식의 전설",
  epi:"소주 7병째. 양대리는 갑자기 일어나 넥타이를 머리에 묶었다.\n그리고 그날 밤의 기억은 아무도 정확히 말하지 못한다.\n다만 회사 로비에 '故 양대리, 회식 중 산화'라는 추모 화환과 함께\n그가 마지막으로 남긴 말이 액자로 걸려 있다.\n\"부장님, 한 병 더는... 제 유언입니다.\"\n\n— 병맛 ENDING: 간이 퇴사했다."},
 {id:"soulswap",kind:"byung",title:"부장과 영혼 교체",

 {id:"boss-report",tag:"정치",t:"부장이 임원 보고자료를 던져준다.\n\"PPT 좀 예쁘게 다듬어줘. 아 참, 보고는 내가 할게.\" (내용도 당신이 다 쓴 것이다.)",
  c:[{l:"완벽하게 만들어 바친다",fx:{boss:8,mental:-5,skill:-1},m:"임원이 감탄했다. 부장이 칭찬을 받았다. 당신은... PPT 실력이 늘었다."},
     {l:"슬라이드 구석에 작게 'made by 양대리' 워터마크",fx:{boss:-2,rep:4,mental:3},m:"임원이 발견하고 피식 웃었다. 부장은 못 봤다. 완벽한 범죄."},
     {l:"\"이번엔 제가 직접 보고하겠습니다\"",fx:{boss:-5,skill:4,rep:3,mental:-3},m:"보고는 떨렸지만 성공적이었다. 임원이 당신의 이름을 기억하기 시작했다."}]},
 {id:"credit-steal",tag:"정치",t:"당신이 만든 자동화 툴을 김과장이 자기 성과로 보고했다는 소문을 들었다.",
  c:[{l:"조용히 넘어간다 (어른의 세계)",fx:{mental:-8,boss:2},m:"참는 자에게 복이... 오지 않았다. 김과장은 그 툴로 표창을 받았다."},
     {l:"커밋 로그를 슬쩍 전체 공유",fx:{rep:6,mental:4,boss:-2},m:"git blame은 거짓말을 하지 않는다. 김과장의 얼굴이 500 에러 색이 됐다."},
     {l:"김과장에게 직접 따진다",fx:{mental:2,rep:2,boss:-5},m:"\"어허, 팀 성과가 다 같은 거지~\" 뻔뻔함에 감탄했지만 최소한 다음부턴 조심할 것이다."}]},
 {id:"chairman-elevator",tag:"정치",t:"엘리베이터에 회장님과 단둘이 탔다. 17층까지 남은 시간 40초.\n회장님이 물었다. \"자네는 요즘 뭐가 제일 재밌나?\"",
  c:[{l:"\"일이 제일 재밌습니다!\" (모범답안)",fx:{boss:5,mental:-2},m:"회장님이 흐뭇하게 웃었다. 다음 주 부장이 '회장님이 자네 칭찬하시더라'며 어깨동무를 했다."},
     {l:"\"요즘 LLM 에이전트 만드는 게 재밌습니다\" (진심)",fx:{skill:3,rep:2,flag:"chairman_ai"},m:"회장님의 눈이 반짝였다. \"그거 우리 회사도 해야 하는 거 아닌가?\" ...뭔가 시작된 것 같다.",chain:"ai-taskforce"},
     {l:"얼어붙어서 침묵",fx:{mental:-3},m:"40초가 40분 같았다. 회장님은 내리며 말했다. \"과묵한 게 미덕이지.\" 세이프."}]},
 // ---------- 돈 ----------
 {id:"salary-nego",tag:"돈",t:"연봉협상 시즌. 인사팀이 내민 인상률은 2.1%.\n올해 물가상승률은 3.8%다. 산수가 이상하다.",
  c:[{l:"사인한다 (순응)",fx:{mental:-6,money:10},m:"\"회사가 어렵다\"는 말과 함께 사인했다. 다음 주 회사는 사옥 로비를 대리석으로 리모델링했다."},
     {l:"시장 연봉 데이터를 들고 협상",fx:{money:30,boss:-3,mental:2},m:"링크드인 스카웃 제안 스크린샷이 결정타였다. 4.5%로 인상. 인사팀이 당신을 '까다로운 직원' 리스트에 올렸다."},
     {l:"\"이직 준비하겠습니다\" 배수진",fx:{money:20,boss:-6,flag:"jobhunt_hint",chain:"headhunter"},m:"인상률이 조금 올랐다. 그리고 정말로 헤드헌터에게 연락이 오기 시작했다."}]},
 {id:"coin",tag:"돈",t:"옆자리 박대리가 속삭인다.\n\"양대리, '개발자코인'이라고 아세요? 개발자들만 아는 코인인데 지금 사면...\"",
  c:[{l:"월급의 절반을 투자",fx:{money:-100,mental:-3,flag:"coin_bet"},m:"차트가 아름다운 우하향 곡선을 그렸다. 개발자들만 아는 코인은 개발자들만 잃는 코인이었다.",chain:"coin-result"},
     {l:"소액만 재미로",fx:{money:-20,mental:1},m:"20만원이 3만원이 됐다. 수업료라고 생각하기로 했다. 비싼 수업이었다."},
     {l:"\"저는 적금이 좋아요\"",fx:{money:5,rep:1,mental:2},m:"박대리가 비웃었다. 3개월 뒤 박대리는 점심을 삼각김밥으로 바꿨다."}]},
 {id:"dinner-pay",tag:"돈",t:"팀 저녁 자리. 계산대 앞에서 모두가 신발끈을 묶거나 전화를 받기 시작했다.\n부장마저 화장실에 갔다.",
  c:[{l:"\"제가 쏘겠습니다!\" (플렉스)",fx:{money:-25,rep:8,boss:3,mental:-2},m:"순간의 호기, 25만원. 하지만 일주일간 당신은 '양보살'로 불리며 존경받았다."},
     {l:"정확하게 N빵 정산 요청",fx:{rep:-2,money:0,mental:2},m:"더치페이 요정 강림. 몇몇은 궁시렁댔지만 이것이 공정이다."},
     {l:"같이 신발끈을 묶는다 (버티기)",fx:{mental:-1,rep:-3},m:"결국 막내가 법인카드 한도를 확인하며 떨리는 손으로 계산했다. 미안하다 막내야."}]},
 {id:"side-income",tag:"돈",t:"지인이 외주를 제안했다. \"간단한 쇼핑몰인데 500만원 어때?\"\n(간단한 쇼핑몰이란 존재하지 않는다.)",
  c:[{l:"받는다 (투잡 시작)",fx:{money:150,health:-10,mental:-8,skill:3},m:"'간단한' 쇼핑몰에는 PG연동, 재고관리, 그리고 지인의 끝없는 수정요청이 포함되어 있었다. 돈은 벌었다."},
     {l:"정중히 거절",fx:{mental:3},m:"\"요즘 회사가 바빠서...\" 지인은 다른 개발자를 잡았고, 그 개발자의 SNS는 3개월째 조용하다."},
     {l:"견적을 3배로 불러 쫓아낸다",fx:{mental:4,money:0},m:"\"1500만원입니다.\" \"에이 뭐가 그렇게 비싸~\" 성공적 퇴치. 그런데 만약 수락했으면 어쩔 뻔했나."}]},
 // ---------- 건강/멘탈 ----------
 {id:"health-check",tag:"건강",t:"건강검진 결과가 나왔다.\n간수치: 위험 / 콜레스테롤: 위험 / 스트레스: 측정불가\n의사: \"직업이... 개발자시죠? 딱 보면 압니다.\"",
  c:[{l:"헬스장 등록 (연간권)",fx:{money:-60,health:12,mental:3,flag:"gym"},m:"연간권을 끊었다. 통계적으로 3회 방문이 예상되지만, 당신은 다를지도 모른다."},
     {l:"영양제 12종 구매로 퉁친다",fx:{money:-20,health:4},m:"아침마다 알약 한 줌. 씹어먹는 건강이다. 없는 것보단 낫다."},
     {l:"결과지를 서랍에 봉인",fx:{mental:2,health:-4},m:"보지 않으면 존재하지 않는 것이다. 슈뢰딩거의 간수치."}]},
 {id:"insomnia",tag:"건강",t:"새벽 3시. 눈을 감으면 오늘 짠 코드가 눈앞에 흘러간다.\n'아... 그 부분 null 체크 안 했는데...'",
  c:[{l:"일어나서 고치고 잔다",fx:{skill:3,health:-6,mental:-2},m:"새벽 4시 커밋: 'fix: null check (잠이 안 와서)'. 다음 날 시니어가 커밋 메시지를 보고 웃었다."},
     {l:"명상 앱을 켠다",fx:{mental:4,health:2,money:-1},m:"\"호흡에 집중하세요...\" 앱 구독료 월 1만원. 코드 생각이 반으로 줄었다. 반은 남았다."},
     {l:"유튜브 알고리즘에 몸을 맡긴다",fx:{health:-5,mental:2},m:"'세계의 기괴한 다리 TOP 10'을 보다 5시에 잠들었다. 왜 봤는지는 아무도 모른다."}]},
 {id:"lunch-alone",tag:"멘탈",t:"오늘따라 아무하고도 말하고 싶지 않다.\n점심시간, 다들 우르르 나가는데...",
  c:[{l:"혼밥 선언 (자발적 아싸)",fx:{mental:7,rep:-2},m:"국밥 한 그릇의 평화. 아무도 '주말에 뭐하셨어요'라고 묻지 않는 60분."},
     {l:"억지로 따라나선다",fx:{mental:-4,rep:3},m:"부장 옆자리에 당첨됐다. 밥이 코로 들어가는지 입으로 들어가는지."},
     {l:"점심 걸러 낮잠 (수면 > 식사)",fx:{health:-3,mental:5},m:"빈 회의실에서 25분 파워냅. 오후의 당신은 다른 사람이 되었다."}]},
 {id:"sunday-night",tag:"멘탈",t:"일요일 밤 9시. 개그 프로가 끝나가고,\n가슴 한켠에서 출근의 공포가 스멀스멀 올라온다.",
  c:[{l:"월요일 할 일을 미리 정리 (프로)",fx:{mental:-2,skill:2,boss:2},m:"내일의 나를 위한 선물. 월요일 아침의 당신이 일요일의 당신에게 감사했다."},
     {l:"새벽 2시까지 게임 (현실도피)",fx:{mental:4,health:-5},m:"'한 판만 더'가 12판이 됐다. 후회는 월요일의 몫이다."},
     {l:"일찍 잔다 (어른의 선택)",fx:{health:5,mental:1},m:"10시 취침. 이것이 어른이다. 재미는 없지만."}]},
 {id:"burnout-sign",tag:"멘탈",cond:s=>s.stats.mental<40,t:"요즘 이상하다. 좋아하던 코딩이 재미없다.\n에러 로그를 봐도 아무 감정이 들지 않는다. 이것은... 번아웃의 전조.",
  c:[{l:"연차 내고 무작정 바다로",fx:{mental:12,boss:-3,money:-15},m:"바다는 코드리뷰를 하지 않는다. 파도는 마감이 없다. 조금 살 것 같다."},
     {l:"정신과 상담 예약 (현명함)",fx:{mental:10,money:-8},m:"\"많이 참으셨네요.\" 그 한마디에 눈물이 핑 돌았다. 병원 오길 잘했다."},
     {l:"참고 버틴다 (한국인의 종특)",fx:{mental:-8,health:-4},m:"'다들 이러고 살잖아'라고 되뇌었다. 위험한 주문이다."}]},
 // ---------- 개발자 문화 ----------
 {id:"conference",tag:"성장",t:"주말에 개발자 컨퍼런스가 열린다. 티켓값 15만원.\n연사 라인업이 화려하다. 굿즈도 준다.",
  c:[{l:"자비로 참석 + 열심히 필기",fx:{money:-15,skill:6,mental:3},m:"키노트에서 영감을 얻고 스티커 17장을 획득했다. 노트북에 붙일 자리가 없다."},
     {l:"회사에 교육비 지원 신청",fx:{skill:5,boss:-2,mental:1},m:"3주간의 품의 끝에 승인. 대신 '참석 후기 전사 공유' 의무가 붙었다."},
     {l:"유튜브에 올라올 때까지 기다린다",fx:{skill:1,money:0},m:"6개월 뒤 1.5배속으로 시청했다. 현장의 열기는 없지만 이불 속은 아늑했다."}]},
 {id:"newbie",tag:"동료",t:"신입이 들어왔다. 부장: \"양대리가 사수 해.\"\n신입의 첫 질문: \"git이 뭔가요? 학교에선 USB로 코드 옮겼는데...\"",
  c:[{l:"기초부터 차근차근 가르친다",fx:{rep:7,skill:2,mental:-5,health:-2},m:"3주 뒤 신입이 첫 PR을 올렸다. 코드는 엉망이지만 커밋 메시지가 정성스러웠다. 뭔가 뭉클하다."},
     {l:"'모던 Git 입문' 책 던져주기",fx:{rep:-3,mental:2},m:"신입은 책 대신 챗봇에게 물어보며 컸다. 요즘 애들은 다 그렇게 큰다."},
     {l:"잡일 셔틀로 활용 (악습 계승)",fx:{mental:3,rep:-7},m:"커피 셔틀, 회의실 예약 셔틀... 신입의 눈빛이 점점 당신을 닮아간다. 나쁜 쪽으로."}]},
 {id:"tabs-spaces",tag:"병맛",t:"팀 채널이 불타고 있다. 주제: '탭 vs 스페이스'.\n벌써 댓글 156개. 시니어 둘이 서로 존댓말을 쓰기 시작했다. (위험신호)",
  c:[{l:"\"포매터 도입하면 되잖아요\" (정답 투척)",fx:{rep:5,skill:2},m:"prettier 도입으로 전쟁 종결. 당신은 중재자로 역사에 남았다. 이제 세미콜론 전쟁만 남았다."},
     {l:"참전한다 (탭 진영)",fx:{mental:-4,rep:-2},m:"3시간을 불태웠다. 아무것도 바뀌지 않았다. 인터넷 논쟁의 정석."},
     {l:"조용히 팝콘 이모지",fx:{mental:3},m:"🍿 관전이 제일 재밌다. 댓글은 227개까지 늘었다."}]},
 {id:"ai-replace",tag:"병맛",t:"부장이 심각한 얼굴로 다가온다.\n\"양대리, 요즘 AI가 코딩 다 해준다며? 그럼 개발팀은 이제 뭐하나?\"",
  c:[{l:"\"AI가 짠 코드 고치는 게 저희 일입니다\"",fx:{boss:5,rep:4,mental:2},m:"부장이 무릎을 쳤다. \"그렇지! 역시 사람이 있어야지!\" 절반은 진담이라 씁쓸했다."},
     {l:"AI로 부장 업무 자동화 시연",fx:{boss:-6,skill:5,rep:5},m:"보고서 자동생성 데모를 보여줬다. 부장의 표정이 어두워졌다. 아차."},
     {l:"\"그래서 저 요즘 AI 공부합니다\"",fx:{skill:4,boss:3},m:"위기를 성장 어필로 전환. 부장이 '역시 양대리'라며 AI 스터디 예산을 따줬다."}]},
 {id:"keyboard",tag:"병맛",t:"옆자리 개발자가 새 기계식 키보드를 샀다. 청축이다.\n따다다닥— 따다다닥— 사무실이 공사장이 됐다.",
  c:[{l:"나도 더 시끄러운 걸 산다 (군비경쟁)",fx:{money:-25,mental:4,rep:-4},m:"클릭압 강한 빈티지 청축 구매. 사무실 데시벨 전쟁 발발. 총무팀이 공문을 검토 중이다."},
     {l:"정중히 저소음 축을 권한다",fx:{rep:2,mental:2},m:"\"적축 어때요? 손목에도 좋대요.\" 의외로 순순히 바꿨다. 평화는 대화로 온다."},
     {l:"노이즈캔슬링 헤드폰 구매",fx:{money:-35,mental:6,skill:2},m:"35만원의 침묵. 세상과 단절되니 생산성이 올랐다. 누가 불러도 못 듣는 게 단점."}]},
 {id:"deploy-friday",tag:"장애",type:"msg",from:"부장",t:"금요일 오후 5시 40분. 부장이 어깨에 손을 얹는다.\n\"양대리, 이거 오늘 배포하고 가지? 간단한 거잖아.\"",
  c:[{l:"\"월요일 오전에 하겠습니다\" (철벽)",fx:{boss:-4,mental:3,rep:5},m:"개발팀 전원이 마음속으로 기립박수를 쳤다. 금요일 배포를 막는 자, 그가 영웅이다."},
     {l:"배포 버튼을 누른다 (금요일 오후 6시)",trap:"friday",m:""},
     {l:"\"네!\" 하고 배포 안 하고 퇴근 (배짱)",fx:{boss:-2,mental:4},m:"월요일에 배포하며 \"금요일에 했는데 지금 반영됐네요\"라고 했다. CDN 캐시 탓을 했다. 완전범죄."}]},
 {id:"tech-debt",tag:"업무",t:"스프린트 회고에서 용기를 내 말했다. \"기술부채 정리할 시간이 필요합니다.\"\nPM: \"부채요? 우리 회사 재무 건전한데요?\"",
  c:[{l:"차근차근 비유로 설명한다",fx:{rep:4,skill:2,mental:-3},m:"'집 안 치우고 손님만 계속 받는 것'이라 설명했다. PM이 드디어 이해했다. 리팩토링 스프린트 획득."},
     {l:"몰래 기능 개발에 리팩토링 끼워넣기",fx:{skill:5,mental:-2},m:"티켓 이름은 '버튼 수정', 실제로는 모듈 재설계. 개발자의 오래된 생존 기술이다."},
     {l:"포기한다. 부채는 쌓이라고 있는 것",fx:{mental:-3,skill:-3},m:"빌드 시간이 4분에서 11분이 됐다. 커피 마실 시간이 늘었다고 정신승리했다."}]},
 {id:"study",tag:"성장",t:"퇴근 후 스터디 제안이 왔다. '주 2회, 알고리즘 스터디'.\n멤버가 다들 이직 준비생 냄새가 난다.",
  c:[{l:"참여한다",fx:{skill:7,health:-4,mental:-2,flag:"study"},m:"백준 골드를 달성했다. 회사 업무에는 1도 쓸모없지만 코딩테스트가 두렵지 않아졌다.",chain:"headhunter"},
     {l:"거절하고 저녁이 있는 삶",fx:{mental:4,health:2},m:"저녁의 여유. 넷플릭스 신작을 정주행했다. 이것도 인생이다."},
     {l:"참여하는 척 유령회원",fx:{rep:-3,mental:1},m:"단톡방 눈팅만 6주째. '오늘도 불참?'이라는 메시지에 숫자 1이 사라지지 않는다."}]},
 {id:"open-source",tag:"성장",t:"업무 중 쓰던 오픈소스 라이브러리에서 버그를 발견했다.\n이슈를 올릴까, 직접 고칠까.",
  c:[{l:"PR까지 올린다 (기여자 등극)",fx:{skill:8,mental:3,health:-3},m:"머지됐다! 컨트리뷰터 목록에 이름이 올랐다. 아무도 몰라주지만 세상에서 제일 뿌듯하다."},
     {l:"이슈만 정성껏 작성",fx:{skill:3,mental:1},m:"메인테이너가 'good catch!'라고 답했다. 오늘 하루 어깨가 올라가 있었다."},
     {l:"우리 코드에서만 우회 처리",fx:{skill:1,mental:-1},m:"// FIXME: 라이브러리 버그 우회 (v2.3.1에서 수정되면 제거) — 그 주석은 v9가 나와도 남아있을 것이다."}]},
 {id:"error-prod",tag:"장애",type:"alert",to:2,t:"모니터링 알람이 미친듯이 울린다. 프로덕션 에러율 급상승.\n원인을 보니... 어제 당신이 배포한 코드다.",
  c:[{l:"즉시 롤백 + 정직한 보고",fx:{boss:-3,rep:6,mental:-4,skill:3},m:"\"제 실수입니다. 롤백했고 원인은...\" 투명한 대응에 시니어가 조용히 엄지를 들었다."},
     {l:"슬쩍 핫픽스로 은폐 시도",fx:{skill:2,mental:-6,boss:2},m:"들키기 전에 고쳤다. 심장은 아직도 뛰고 있다. 모니터링 대시보드를 볼 때마다 뜨끔하다."},
     {l:"\"이거 인프라 문제 같은데요?\" (책임 전가)",fx:{rep:-8,mental:-3,boss:1},m:"인프라팀이 밤새 조사한 끝에 당신 코드가 범인임을 밝혀냈다. 인프라팀의 살생부에 이름이 올랐다."}]},
 {id:"desk-move",tag:"병맛",t:"자리 이동 시즌. 새 좌석표를 보니 당신 자리가...\n부장 정면, 모니터가 훤히 보이는 그 자리다.",
  c:[{l:"조용히 받아들이고 모니터 각도 조절의 달인이 된다",fx:{mental:-4,boss:3},m:"15도의 미학. 부장 시점에서는 코드만 보인다. 실제로도 코드만 봐야 하게 됐다."},
     {l:"'허리 디스크' 진단서로 창가 자리 획득",fx:{mental:5,money:-3,rep:-2},m:"진단서의 힘은 위대했다. 창가에서 은행나무를 보며 코딩한다. 디스크는... 사실 살짝 있긴 하다."},
     {l:"총무팀 담당자에게 커피 뇌물",fx:{money:-2,mental:3,rep:1},m:"아아 한 잔에 자리가 바뀌었다. 대한민국은 커피 공화국이다."}]},
 {id:"slack-typo",tag:"병맛",t:"부장에게 보낼 DM을 전체 채널에 보냈다.\n내용: \"부장님 오늘 넥타이 좀 심하네요 ㅋㅋ\"\n...읽음 47.",
  c:[{l:"0.3초 만에 삭제 후 잠수",fx:{mental:-5,rep:2},m:"삭제했지만 스크린샷은 빛보다 빨랐다. 부장 넥타이는 다음 날부터 무난해졌다. 공익적 사고였다."},
     {l:"\"해킹당했습니다\" (우기기)",fx:{rep:-4,mental:-2},m:"아무도 믿지 않았다. 보안팀에서 진짜로 조사 나온 게 더 문제였다."},
     {l:"정면돌파: \"부장님 죄송합니다. 근데 좀 심하긴 했습니다\"",fx:{boss:-5,rep:8,mental:3},m:"사무실이 얼어붙은 3초 후, 부장이 껄껄 웃었다. \"이 자식 봐라?\" 전설의 시작이었다."}]},
 {id:"server-room",tag:"병맛",t:"에어컨이 고장난 한여름. 사무실은 32도.\n그런데 서버실은... 항상 21도. 서늘하고, 조용하고, 아무도 없다.",
  c:[{l:"노트북 들고 서버실로 이주한다",fx:{mental:6,health:2,rep:-2,flag:"server_love"},m:"팬 소음이 백색소음이 되어 집중력이 폭발했다. 이곳이... 좋아지기 시작했다.",chain:"server-deeper"},
     {l:"참고 자리를 지킨다",fx:{health:-5,mental:-3},m:"땀으로 인증하는 성실함. 키보드에 땀이 떨어졌다. 방수 키보드라 다행이다."},
     {l:"휴가를 낸다 (전략적 후퇴)",fx:{mental:5,boss:-2,money:-10},m:"집 에어컨 아래에서 재택... 아니 휴가를 즐겼다. 에어컨 수리는 당신이 복귀한 날 완료됐다."}]},
 {id:"boss-bald",tag:"회식",cond:s=>s.stats.liver<50,t:"회식 3차. 취기가 오른다. 조명 아래 부장의 머리가\n성스럽게 빛나고 있다. 손이... 손이 자꾸 그쪽으로...",
  c:[{l:"이성의 끈을 붙잡는다",fx:{mental:-2,liver:-12},m:"물을 세 잔 연거푸 마시며 참았다. 오늘 밤 최대의 업적이다."},
     {l:"만진다. 소원을 빈다.",trap:"bald",m:""},
     {l:"\"부장님 머리에서 후광이...\" (말로만)",fx:{boss:-3,rep:5,mental:2,liver:-3},m:"순간 정적. 다행히 부장은 '이 자식 취했네~'로 넘겼고 동료들은 며칠을 웃었다."}]},
 {id:"vibe-coding",tag:"업무",t:"신입이 AI로 하루 만에 기능을 뚝딱 만들어왔다.\n근데 코드를 보니... 돌아는 가는데 아무도 이해할 수 없다. 본인 포함.",
  c:[{l:"같이 앉아 코드를 해부한다",fx:{skill:4,rep:5,mental:-4,health:-2},m:"\"이 함수가 왜 있는지 AI한테 물어볼까요?\" 둘이서 3시간. 신입이 코드를 '이해하는 법'을 배웠다."},
     {l:"돌아가면 됐지, 머지",fx:{skill:-4,mental:2},m:"3개월 뒤 그 코드에서 장애가 났다. 원인 분석에 이틀 걸렸다. AI도 기억 못 한다고 했다."},
     {l:"테스트 코드 작성을 조건으로 건다",fx:{skill:3,rep:2},m:"\"AI로 만들었으면 테스트도 AI로.\" 커버리지 90%. 의외로 건강한 절충안이었다."}]},
 {id:"expense",tag:"돈",t:"법인카드 영수증 처리 마감일. 3개월치가 밀려 있다.\n총무팀에서 최후통첩이 왔다: \"오늘까지 미제출 시 개인 부담.\"",
  c:[{l:"반차급 집중력으로 전부 처리",fx:{mental:-5,money:15},m:"영수증 43장, 3시간의 사투. 15만원을 지켜냈다. 경비처리도 개발처럼 미루면 부채가 된다."},
     {l:"영수증 못 찾은 건 포기",fx:{money:-8,mental:1},m:"8만원 증발. 그 돈으로 마음의 평화를 샀다고 치자."},
     {l:"영수증 처리 자동화 스크립트 제작",fx:{skill:5,mental:-3,rep:6},m:"OCR로 영수증을 자동 분류하는 스크립트를 짰다. 총무팀이 전사 도입을 검토 중이다. 일이 늘었다."}]},
 {id:"friend-nakara",tag:"멘탈",t:"대학 동기 모임. 네카라쿠배 다니는 동기가 말했다.\n\"우리 회사는 점심이 공짜야. 마사지실도 있어. 넌 요즘 어때?\"",
  c:[{l:"\"난 회사가 가족 같아\" (자기최면)",fx:{mental:-6},m:"가족 같은 회사(가족처럼 부려먹음). 집에 오는 길에 이직 사이트를 열었다 닫았다."},
     {l:"자극받아 이직 준비 결심",fx:{mental:2,skill:3,flag:"jobhunt_hint"},m:"그날 밤 이력서를 업데이트했다. 마지막 수정일: 4년 전. 갈 길이 멀다.",chain:"headhunter"},
     {l:"\"대신 우리 회사는 망할 일이 없지\" (정신승리)",fx:{mental:4,rep:1},m:"동기가 웃으며 인정했다. \"하긴 너네는 공공 SI 물려있지...\" 안정성도 스펙이다."}]},
 {id:"typo-db",tag:"장애",t:"운영 DB에 쿼리를 날리려는 순간, 손가락이 미끄러졌다.\nDELETE FROM users — WHERE절을 안 붙였다. 아직 엔터는 안 눌렀다.",
  c:[{l:"침착하게 백스페이스",fx:{mental:-3,skill:2},m:"식은땀 한 방울. 이날 이후 당신은 운영 DB에서 자동커밋을 끄는 사람이 되었다. 성장이다."},
     {l:"트랜잭션으로 감싸는 습관 정착",fx:{skill:5,mental:1},m:"BEGIN; 이 여섯 글자가 인생을 지킨다. 시니어의 길로 한 걸음."},
     {l:"운영 DB 접근권한 반납 선언",fx:{skill:-2,mental:4,rep:2},m:"\"저를 저에게서 보호해주세요.\" DBA가 웃으며 읽기전용 계정을 만들어줬다. 현명한 겁쟁이."}]},
 {id:"kpi-season",tag:"정치",t:"KPI 작성 시즌. '정량 성과를 숫자로 쓰시오.'\n버그 고친 걸 어떻게 숫자로 쓰지? '나의 실수 37건 수습'이라고 쓸 순 없잖아.",
  c:[{l:"화려한 마사지 (장애율 개선 300%)",fx:{boss:6,mental:-3},m:"분모를 잘 고르면 모든 숫자는 아름다워진다. 통계의 마법. 양심이 조금 아팠다."},
     {l:"담백하게 사실만 기술",fx:{boss:-3,mental:3,rep:2},m:"'한 일: 개발. 결과: 돌아감.' 수준의 정직함. 평가자는 심심해했지만 당신은 떳떳하다."},
     {l:"동료들과 상부상조 품앗이 (서로 성과 언급)",fx:{rep:6,boss:2},m:"'박대리와의 협업으로...' '양대리의 지원 덕분에...' 아름다운 순환 참조다. 컴파일러가 보면 화낼 구조."}]},
 {id:"remote-work",tag:"업무",t:"드디어 재택근무 시범 도입! 주 1회.\n부장: \"근데 재택하면 일 하는지 어떻게 알지?\" (전원을 향한 질문)",
  c:[{l:"재택일에 평소보다 2배 성과 (증명)",fx:{skill:4,health:-3,boss:6},m:"커밋 폭탄으로 증명했다. 부장이 재택을 주 2회로 늘렸다. 모두가 당신 덕이라 했다. 뿌듯한 피로."},
     {l:"마우스 무버 구매 (온라인 상태 유지)",fx:{money:-3,mental:5,skill:-2},m:"초록불은 켜져 있다. 당신은 빨래를 갠다. 슬랙 답장 속도만 관리하면 완전범죄... 양심은 접어두자."},
     {l:"\"성과로 평가하시면 됩니다\" (정론)",fx:{rep:5,boss:-2},m:"맞는 말이라 아무도 반박 못 했다. 맞는 말은 원래 미움받는다."}]},
 {id:"elevator-broken",tag:"병맛",t:"엘리베이터 점검일. 사무실은 11층.\n계단 앞에서 다들 심호흡 중이다.",
  c:[{l:"11층 계단 등반 (운동이다)",fx:{health:5,mental:-2},m:"7층부터 다리가 후들거렸지만 정상 정복. 오늘의 운동 완료. 내일 근육통 예약."},
     {l:"1층 카페에서 점검 끝날 때까지 대기",fx:{mental:4,boss:-3,money:-1},m:"'엘리베이터 대기 중'이라는 신개념 근태를 창시했다. 부장에게 들키기 전까지는 완벽했다."},
     {l:"옆 건물 엘리베이터로 옥상 넘어가기 (파쿠르)",fx:{mental:3,health:-2,rep:3},m:"실제로 가능했다! 동료들에게 비밀 루트를 전파하며 '개척자'라는 별명을 얻었다."}]},
 {id:"cert-exam",tag:"성장",t:"회사가 자격증 수당을 신설했다. 정보처리기사 월 5만원.\n근데 실무에서 정보처리기사는... 음...",
  c:[{l:"수당은 수당이다. 공부 시작",fx:{skill:2,mental:-4,money:20,health:-2},m:"두 달 공부해서 합격. 월 5만원 x 영원히. 시험지식은 시험장에 두고 왔다."},
     {l:"차라리 클라우드 자격증 도전",fx:{skill:6,money:-40,mental:-3},m:"시험비 40만원(자비). 수당은 없지만 이력서가 두꺼워졌다. 미래를 위한 투자다."},
     {l:"자격증 무용론 설파",fx:{mental:2,rep:-1},m:"\"깃허브가 자격증이죠.\" 멋있게 말했지만 수당 받는 동료를 보니 조금 배가 아팠다."}]},
 {id:"team-dinner-menu",tag:"병맛",t:"팀 점심 메뉴 결정의 시간. 부장: \"아무거나 좋아. 편하게 골라봐.\"\n(주의: '아무거나'는 함정이다. 부장의 취향은 국밥뿐이다.)",
  c:[{l:"\"국밥 어떠세요?\" (정답 제출)",fx:{boss:4,rep:-2},m:"\"오~ 양대리가 뭘 좀 아네!\" 젊은 팀원들의 눈빛이 마라탕을 외치고 있었지만 못 본 척했다."},
     {l:"마라탕 강행 (세대교체 선언)",fx:{rep:5,boss:-3,health:-1},m:"부장은 마라탕 앞에서 땀을 뻘뻘 흘리며 \"어, 어 맛있네\"를 반복했다. 다음 주는 국밥 2연속이었다."},
     {l:"사다리타기 앱으로 책임 회피",fx:{rep:2,mental:2},m:"알고리즘의 선택은 쌀국수. 아무도 원망할 수 없는 완벽한 시스템. 이것이 공학적 해법이다."}]},
 {id:"password-90",tag:"병맛",t:"[전사공지] 비밀번호를 90일마다 변경하세요. 특수문자 2개, 대문자, 숫자 포함 16자 이상.\n이전 12개 비밀번호와 달라야 함.",
  c:[{l:"패스워드 매니저 도입 (정석)",fx:{skill:2,mental:2,money:-2},m:"이제 마스터 비밀번호 하나만 기억하면 된다. 그 하나를 까먹기 전까지는 완벽한 시스템이다."},
     {l:"Tpqhd2026!@ → Tpqhd2026!# (연금술)",fx:{mental:1},m:"마지막 특수문자만 순환시키는 고전 기법. 보안팀이 알면 울겠지만 전 직원의 87%가 쓰는 방법이다."},
     {l:"포스트잇에 적어 모니터에 부착 (보안의 종말)",fx:{mental:3,rep:-3},m:"보안팀 순찰에 적발됐다. 전사 보안교육 1시간 추가의 원흉으로 지목되어 따가운 눈총을 받았다."}]},
 {id:"gym-check",tag:"건강",cond:s=>s.flags.gym,t:"헬스장 등록 후 한 달. 출석 횟수: 2회.\n오늘도 퇴근길, 헬스가방이 당신을 쳐다본다.",
  c:[{l:"간다. 오늘은 진짜 간다.",fx:{health:8,mental:2},m:"러닝머신 30분. 끝나고 나온 밤공기가 달았다. 왜 안 왔지 싶다가도 내일이면 까먹겠지."},
     {l:"'집이 헬스장' 선언 (홈트 전환)",fx:{health:2,mental:1},m:"유튜브 홈트 영상을 틀었다. 보기만 했다. 시청도 운동의 일부라고 믿기로 했다."},
     {l:"환불 요청 (손절의 미학)",fx:{money:30,mental:3,health:-2},m:"위약금 떼고 30만원 회수. 헬스장과의 인연은 여기까지. 서로 좋은 기억만 남기기로 했다."}]},
 {id:"phone-mom",tag:"멘탈",type:"msg",from:"어머니",t:"야근 중 어머니에게 전화가 왔다.\n\"아들, 밥은 먹었니? 회사에서 아직 안 왔어?\"",
  c:[{l:"\"지금 먹으러 가요\" (야근 은폐)",fx:{mental:-2,health:-2},m:"전화를 끊고 편의점 삼각김밥을 샀다. 참치마요. 어머니에겐 제육볶음이라고 하자."},
     {l:"솔직하게 야근이라고 말한다",fx:{mental:3},m:"\"몸 상한다, 대충하고 와.\" 그 말에 갑자기 코끝이 시큰했다. 오늘은 11시 전에 퇴근하기로 했다."},
     {l:"영상통화로 사무실 투어 (역공)",fx:{mental:4,rep:2},m:"\"여기가 제 자리, 여기가 탕비실—\" 어머니가 즐거워하셨다. 옆자리 박대리가 손을 흔들었다."}]},
 {id:"quarterly-close",tag:"업무",type:"alert",to:2,t:"분기 마감 주간. 전사 시스템 사용량 폭증으로 서버가 비명을 지른다.\n영업팀: \"시스템 왜 이렇게 느려요?!\" (5분마다 문의)",
  c:[{l:"임시 스케일업 + 밤샘 모니터링",fx:{health:-8,boss:7,skill:3},m:"서버 증설로 위기를 넘겼다. 새벽 4시 대시보드 앞에서 혼자 조용히 주먹을 쥐었다. 아무도 못 봤지만."},
     {l:"'조회는 5분 캐시입니다' 공지로 방어",fx:{skill:4,rep:-2,mental:2},m:"캐시를 붙이니 문의가 사라졌다. 데이터가 5분 늦는 걸 아무도 눈치 못 챘다. 애초에 실시간일 필요가 없었던 것이다."},
     {l:"영업팀 문의 채널을 음소거",fx:{mental:4,rep:-5},m:"평화로운 일주일. 그리고 영업본부장의 항의 메일이 부장에게 도착했다. 평화의 대가는 비쌌다."}]},
 {id:"birthday",tag:"병맛",t:"당신의 생일. 그런데 하필 오늘이 대규모 배포일이다.\n케이크 대신 배포 체크리스트가 놓여 있다.",
  c:[{l:"배포를 마치고 혼자 조각케이크",fx:{mental:2,health:-3,boss:4},m:"배포 성공 알림과 함께 편의점 케이크에 초를 꽂았다. 소원: 내년 생일엔 배포가 없기를."},
     {l:"\"생일이라 연차입니다\" (당당)",fx:{mental:7,boss:-4},m:"배포는 연기됐다. 놀랍게도 세상은 멸망하지 않았다. 생일은 1년에 하루니까."},
     {l:"팀에 생일을 공개하고 커피 쏘기 (역조공)",fx:{money:-8,rep:6,mental:3},m:"\"생일자가 왜 쏘냐\"면서 다들 잘만 받아 마셨다. 대신 배포를 동료들이 나눠 들어줬다. 남는 장사였다."}]},
 {id:"chair",tag:"건강",t:"허리에서 '뚝' 소리가 났다. 회사 의자는 10년 된 고정형.\n옆 부서는 최근 100만원짜리 의자로 전부 교체됐다는 소문이 있다.",
  c:[{l:"산재 뉘앙스를 풍기며 의자 요청",fx:{boss:-2,health:5,mental:2},m:"'허리 통증으로 인한 생산성 저하 우려'라는 품의가 통과됐다. 새 의자가 왔다. 관료제는 조련하기 나름이다."},
     {l:"자비로 의자 구매 (내 몸은 소중하니까)",fx:{money:-80,health:8,mental:3},m:"80만원. 앉는 순간 알았다. 이건 가구가 아니라 의료기기다. 허리가 감사 인사를 전해왔다."},
     {l:"요가매트 깔고 스탠딩+스트레칭",fx:{health:4,rep:2,mental:1},m:"매시간 스트레칭하는 당신을 보고 하나둘 따라 하기 시작했다. 개발1팀이 요가원이 되어간다."}]},
 {id:"legacy-doc",tag:"업무",t:"인수인계 문서를 발견했다. 퇴사한 전임자가 남긴 유일한 기록:\n\"서버 재시작은 금요일에 하지 마세요. 이유는 아시게 될 겁니다.\"",
  c:[{l:"이유를 파헤친다 (고고학)",fx:{skill:7,mental:-4,health:-2},m:"3일의 추적 끝에 발견: 금요일마다 도는 정산 배치와 충돌. 문서화했다. 당신은 전임자보다 나은 사람이다."},
     {l:"그냥 믿고 금요일을 피한다",fx:{mental:1},m:"선조의 지혜는 따르는 것. 금요일의 서버는 건드리지 않는다. 그것이 이 회사의 율법이다."},
     {l:"금요일에 재시작해본다 (호기심)",fx:{mental:-7,boss:-5,health:-4,skill:2},m:"이유를 아시게 됐다. 정산 데이터 7만 건이 꼬였고, 주말이 증발했다. 전임자는 옳았다."}]},
 {id:"hackathon",tag:"성장",t:"사내 해커톤 공지가 떴다. 우승 상금 300만원.\n주제: '업무를 혁신하는 아이디어'. 단, 참가는 업무 외 시간에.",
  c:[{l:"참가. 우승을 노린다",fx:{health:-7,mental:-3,skill:6,money:100,rep:4},m:"이틀 밤을 갈아 '회의록 자동요약 봇'으로 준우승. 상금 100만원과 '그거 실제로 만들어줘'라는 새 업무를 얻었다.",flag:"hackathon"},
     {l:"구경만 한다 (치킨 획득)",fx:{mental:2,health:1},m:"참가팀들이 밤새는 동안 응원 치킨만 축냈다. 시상식에서 제일 크게 박수 쳤다. 그것도 기여다."},
     {l:"심사위원 어시스트 자원 (정치적 수)",fx:{boss:4,rep:3},m:"운영을 돕다 임원들과 자연스럽게 안면을 텄다. 참가보다 남는 장사였을지도 모른다."}]},
 {id:"toilet-code",tag:"병맛",t:"화장실 칸에서 15분째. 머릿속에서 안 풀리던 버그의 해답이 번쩍였다.\n그런데 폰도 노트도 없다. 이 깨달음, 자리까지 살아남을 수 있을까.",
  c:[{l:"입으로 중얼거리며 전력질주",fx:{skill:5,rep:-2,mental:3},m:"\"인덱스가 꼬였어, 인덱스가...\" 복도를 달리며 중얼거리는 당신을 다들 피했지만, 버그는 잡혔다."},
     {l:"휴지에 손톱으로 눌러쓴다",fx:{skill:3,mental:2},m:"휴지 설계도가 탄생했다. 액자에 넣고 싶을 만큼 완벽한 로직이었다. 인류의 위대한 발견은 늘 화장실에서."},
     {l:"까먹는다 (그런 날도 있지)",fx:{mental:-3},m:"자리에 앉는 순간 증발했다. 그 해답은 다시 오지 않았다. 버그는 2주를 더 살았다."}]},
 {id:"office-cat",tag:"병맛",t:"회사 주차장에 길고양이가 나타났다. 개발팀 몰래 사료를 주기 시작한 지 2주.\n오늘 고양이가 사무실 문 앞까지 따라왔다.",
  c:[{l:"'서버실 지킴이'로 임명 (몰래 입양)",fx:{mental:8,rep:4,money:-5},m:"고양이 이름은 '널포인터'. 개발팀 전체가 공범이 됐다. 널포인터를 쓰다듬으면 버그가 줄어든다는 미신이 생겼다."},
     {l:"입양 공고를 올려준다",fx:{mental:3,rep:2},m:"경영지원팀 대리가 데려갔다. 가끔 사진이 올라온다. 잘 지내는 것 같아 다행이다."},
     {l:"못 본 척한다 (알레르기)",fx:{mental:-2},m:"고양이는 옆 건물 스타트업으로 갔다. 그 회사 인스타 마스코트가 됐다. 팔로워 2만. 조금 배 아프다."}]},
 {id:"english-name",tag:"병맛",t:"[전사공지] 수평문화 도입! 이제 전 직원 영어 이름을 사용합니다.\n부장은 'Tiger'를 골랐다. 당신 차례다.",
  c:[{l:"무난하게 'Ryan'",fx:{rep:1,mental:1},m:"사내에 Ryan이 4명이 됐다. 회의 때 \"Ryan이 하기로 했잖아요\"라고 하면 4명이 서로를 쳐다본다. 완벽한 책임 분산이다."},
     {l:"'Yang' (성이 곧 이름)",fx:{mental:3,rep:3},m:"모두가 결국 '양대리'라고 불렀다. 수평문화는 3주 만에 '티아이거 부장님'과 함께 자연사했다."},
     {l:"'Null' (개발자 조크)",fx:{rep:5,mental:2,boss:-2},m:"인사 시스템에 이름이 등록되지 않는 대참사가 발생했다. 전산팀은 당신을 저주했고 개발자들은 당신을 숭배했다."}]},
 {id:"subway-fix",tag:"병맛",t:"출근길 지하철. 옆자리 사람 노트북 화면에 낯익은 에러가 보인다.\n당신이 3일 동안 헤맸던 바로 그 에러다. 해결법을 안다.",
  c:[{l:"참견한다: \"저... 그거 버전 문제예요\"",fx:{mental:4,rep:1,flag:"subway_savior"},m:"낯선 이의 눈이 커졌다. \"헐, 감사합니다!\" 알고 보니 옆 회사 개발자. 커피 기프티콘이 도착했다. 세상은 좁고 에러는 같다."},
     {l:"조용히 지켜본다 (남의 고통 관람)",fx:{mental:2},m:"그가 스택오버플로우의 잘못된 답변을 따라가는 걸 지켜봤다. 3일 코스다. 묵념."},
     {l:"자는 척한다 (출근 전 에러 금지)",fx:{health:2,mental:1},m:"출근 전엔 에러를 보지 않는다. 그것이 나만의 워라밸 규칙. 눈을 감으니 진짜 잠들어 한 정거장을 지나쳤다."}]},
 {id:"ceo-town-hall",tag:"정치",t:"타운홀 미팅. 대표: \"자유롭게 질문하세요. 어떤 질문도 좋습니다.\"\n(마이크 앞 침묵 45초째. 사회자의 이마에 땀이 흐른다.)",
  c:[{l:"연봉 테이블 공개를 질문 (금기 돌파)",fx:{rep:9,boss:-5,mental:2},m:"장내가 술렁였다. 대표는 \"좋은 질문\"이라며 답변을 회피했지만, 그날 사내 익명게시판의 영웅이 됐다."},
     {l:"\"회사의 10년 비전이 궁금합니다\" (모범생)",fx:{boss:4,rep:-2},m:"대표가 신나서 40분 답변했다. 타운홀이 40분 연장됐다. 모두가 당신을 원망했다."},
     {l:"침묵을 지킨다 (생존 본능)",fx:{mental:1},m:"결국 사회자가 준비된 질문을 읽었다. \"미리 받은 질문인데요~\" 모두 알고 있었다. 처음부터 정해져 있었음을."}]},
 {id:"data-request",tag:"업무",t:"마케팅팀 요청: \"지난 3년치 고객 데이터 엑셀로 뽑아주세요. 오늘까지요.\"\n행 수를 확인해보니 1,200만 건이다. 엑셀 한계는 104만 행.",
  c:[{l:"엑셀의 한계를 설명하고 대안 제시",fx:{skill:4,rep:3,mental:-2},m:"대시보드를 만들어줬다. 마케팅팀이 신세계라며 감동했다. 그리고 매주 대시보드 수정 요청이 오기 시작했다."},
     {l:"12개 파일로 쪼개서 전달 (요청대로)",fx:{mental:1,skill:-1},m:"마케팅팀 노트북이 파일을 여는 데 20분씩 걸렸다. 그들은 그것을 3년간 사용했다. 인간의 적응력은 위대하다."},
     {l:"\"개인정보라 법무 검토가 필요합니다\" (방패)",fx:{mental:3,rep:-1},m:"법무팀 검토 3주. 그 사이 마케팅팀은 요청 자체를 까먹었다. 관료제는 때로 개발자의 친구다."}]},
 {id:"snack-war",tag:"병맛",t:"탕비실 간식이 리뉴얼됐다. 초코파이가 사라지고 '단백질바(무맛)'가 들어왔다.\n사내가 술렁인다. 게시판에 '간식 개악 반대' 글이 올라왔다.",
  c:[{l:"서명운동 동참 (초코파이 수호)",fx:{rep:4,mental:3},m:"서명 200명 돌파. 총무팀이 백기를 들고 초코파이를 복원했다. 민주주의는 탕비실에서 시작된다."},

function fixedEventFor(t){
  const c=cal(t);
  // 인사평가: 12,24,36개월차 1주
  if(c.month===12&&c.week===1) return makeReview(c.year);
  // 연말 회식: 12월 3주
  if(c.month===12&&c.week===3) return YEAR_END_PARTY;
  // 명절: 2월 1주(설), 9월 2주(추석)
  if(c.month===2&&c.week===1) return HOLIDAY_SEOL;
  if(c.month===9&&c.week===2) return HOLIDAY_CHUSEOK;
  return null;
}

   t:`${year}년차 인사평가의 날.\n부장이 평가 면담실에서 당신의 1년을 스프레드시트로 열어보고 있다.\n(평가 기준: 상사호감 + 개발력 + 사내평판)`,
   c:[{l:"결과를 확인한다",fx:{},m:"",review:true}]};
}

/* =====================================================
   턴 진행
   ===================================================== */
function pickEvent(){
  const t=S.turn;
  const fixed=fixedEventFor(t);
  if(fixed) return fixed;
  // 체인 큐
  const due=S.chainQueue.filter(q=>q.at<=t);
  for(const q of due){
    const ch=CHAINS[q.id];
    S.chainQueue=S.chainQueue.filter(x=>x!==q);
    if(ch&&(!ch.ev.cond||ch.ev.cond(S))) return ch.ev;
  }
  // 랜덤 풀 (최근 12턴 등장 제외)
  const pool=EVENTS.filter(e=>!S.recentEvents.includes(e.id)&&(!e.cond||e.cond(S)));
  const ev=pool.length?pool[Math.floor(Math.random()*pool.length)]:EVENTS[Math.floor(Math.random()*EVENTS.length)];
  return ev;
}

function applyFx(fx){
  const lines=[];
  const name={mental:"멘탈",health:"체력",boss:"상사호감",skill:"개발력",rep:"사내평판",liver:"간 수치",money:"잔고"};
  for(const k in fx){
    if(!(k in name))continue; // flag/chain 등 비스탯 키 무시
    if(k==="money"){S.stats.money+=fx[k];}
    else S.stats[k]=clamp(S.stats[k]+fx[k],0,100);
    const v=fx[k];
    lines.push(`${name[k]} ${v>0?"+":""}${v}${k==="money"?"만원":""}`);
  }
  return lines.join("  ");
}

function choose(ev,ch){
  // 트랩 즉사
  if(ch.trap){finish(ch.trap);return;}
  if(ch.ending){finish(ch.ending);return;}
  // 인사평가
  if(ch.review){doReview();return;}
  const fxText=applyFx(ch.fx||{});
  const flag=ch.flag||(ch.fx&&ch.fx.flag), chain=ch.chain||(ch.fx&&ch.fx.chain);
  if(flag)S.flags[flag]=true;
  if(chain&&CHAINS[chain]&&!S.flags["chain_"+chain]){
    S.flags["chain_"+chain]=true;
    S.chainQueue.push({id:chain,at:S.turn+CHAINS[chain].delay});
  }
  if(!ev.fixed)S.recentEvents=[ev.id,...S.recentEvents].slice(0,12);
  showResult(ch.m,fxText,()=>advance());
}

function doReview(){
  const score=S.stats.boss+S.stats.skill+S.stats.rep;
  const y=cal(S.turn).year;
  if(score>=225){
    // 승진!
    finish("promo");return;
  }
  S.promoFail++;
  let m,fx;
  if(score>=170){m=`평가 등급: B+\n부장: "아깝게 승진 TO에서 밀렸어. 내년엔 꼭..."\n(그 말, ${y}번째 듣는 것 같다.)`;fx={mental:-5,money:30};}
  else if(score>=130){m=`평가 등급: B-\n"무난했다"는 평. 무난함의 대가는 물가상승률 이하의 연봉 인상이다.`;fx={mental:-4,money:15};}
  else{m=`평가 등급: C\n면담실 공기가 무거웠다. "양대리, 요즘 무슨 일 있나?"\n경고등이 켜졌다.`;fx={mental:-8,boss:-5};}
  if(S.promoFail>=3){finish("forever");return;}
  const fxText=applyFx(fx);
  showResult(m,fxText,()=>advance());
}

function advance(){
  S.turn++;
  // 월급/생활비 (매월 1주)
  if(S.turn%4===0){
    S.stats.money+=280-200; // 월급 280, 생활비 200
  }
  // 자연 소모
  S.stats.health=clamp(S.stats.health-1,0,100);
  S.stats.mental=clamp(S.stats.mental-1,0,100);
  if(S.stats.liver>=50)S.stats.liver=clamp(S.stats.liver+1,0,100); // 간은 50 미만이면 회복 불가
  // 파산 체크
  if(S.stats.money<0)S.minusStreak++;else S.minusStreak=0;
  // 사망/엔딩 판정
  const dead=checkDeath();
  if(dead){finish(dead);return;}
  // 사이드프로젝트 엔딩: 해커톤+개발력 90+
  if(S.flags.hackathon&&S.stats.skill>=90){finish("sidepj");return;}
  // 3년 완주
  if(S.turn>=TOTAL_TURNS){
    // 완주 시 최종 평가로 promo or forever
    const score=S.stats.boss+S.stats.skill+S.stats.rep;
    finish(score>=225?"promo":"forever");return;
  }
  save();
  renderTurn();
}

function checkDeath(){
  const s=S.stats;
  if(s.mental<=0)return"burnout";
  if(s.health<=0)return"karoshi";
  if(s.liver<=0)return"liver";
  if(s.boss<=0||s.skill<=0)return"fired";
  if(s.minusStreak===undefined?false:false)return null;
  if(S.minusStreak>=6||s.money<=-250)return"bankrupt";
  return null;
}

function finish(endId){
  clearSave();
  const e=endById(endId);
  const isNew=addDex(endId);
  showEnding(e,isNew);
}

const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));$(id).classList.add("on");}

function renderStats(){
  const box=$("ui-stats");box.innerHTML="";
  for(const[k,lb]of STAT_DEF){
    const v=S.stats[k];
    const cls=v<=20?"crit":v<=40?"warn":"";
    box.insertAdjacentHTML("beforeend",
     `<div class="stat"><span class="lb">${lb}</span><span class="bar"><span class="fill ${cls}" style="width:${v}%"></span></span><span class="vl mono">${v}</span></div>`);
  }
  const m=S.stats.money;
  box.insertAdjacentHTML("beforeend",
   `<div class="stat money"><span class="lb">통장잔고</span><span></span><span class="vl mono ${m<0?"minus":""}">${m}만원</span></div>`);
  // 표정
  const f=$("face");f.setAttribute("class","face");
  const s=S.stats;
  if(s.liver<=25)f.classList.add("drunk");
  else if(s.mental<=20||s.health<=20)f.classList.add("dead");
  else if(s.mental<=45||s.health<=40)f.classList.add("tired");
  else if(s.mental>=75&&s.health>=60)f.classList.add("happy");
  const c=cal(S.turn);
  $("ui-date").textContent=`${c.year}년차 ${c.month}월 ${c.week}주`;
  $("ui-grade").textContent=`개발1팀 · ${S.grade}`;
}

let currentEv=null,timers=[];
function clearTimers(){timers.forEach(t=>{clearTimeout(t);clearInterval(t);});timers=[];}
function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function renderTurn(){
  clearTimers();
  renderStats();
  currentEv=pickEvent();
  const ev=currentEv;
  $("ev-tag").textContent=`[${ev.tag}]`;
  $("ev-turn").textContent=`WEEK ${S.turn+1}/${TOTAL_TURNS}`;
  $("fx-log").style.display="none";
  $("ev-text").innerHTML="";$("ev-choices").innerHTML="";
  document.querySelectorAll("#scr-game .panel").forEach(p=>p.classList.remove("alert-card"));
  if(ev.type==="msg")renderMsg(ev);
  else if(ev.type==="alert")renderAlert(ev);
  else if(ev.type==="timing")renderTiming(ev);
  else{$("ev-text").textContent=ev.t;renderChoices(ev);}
  show("scr-game");
}
function renderChoices(ev){
  const box=$("ev-choices");box.innerHTML="";
  ev.c.forEach(ch=>{
    const b=document.createElement("button");
    b.textContent=ch.l;
    b.onclick=()=>{clearTimers();choose(ev,ch);};
    box.appendChild(b);
  });
}
function renderMsg(ev){
  const txt=$("ev-text");
  txt.innerHTML=`<div class="chat"></div>`;
  const chat=txt.querySelector(".chat");
  const lines=ev.t.split("\n").filter(Boolean);
  let i=0;
  const addNext=()=>{
    if(i>=lines.length){renderChoices(ev);return;}
    const d=document.createElement("div");d.className="bubble";
    d.innerHTML=`<div class="who">${esc(ev.from)}</div><span class="typing">···</span>`;
    chat.appendChild(d);
    timers.push(setTimeout(()=>{
      d.querySelector(".typing").outerHTML=esc(lines[i]);
      i++;addNext();
    },600));
  };
  addNext();
}
function renderAlert(ev){
  const txt=$("ev-text");
  const secs=12;
  document.querySelector("#scr-game .panel:last-of-type").classList.add("alert-card");
  txt.innerHTML=`<div class="alert-timer"><span class="tfill"></span></div>
   <div class="alert-head mono">🚨 긴급 상황 — <span class="alert-count">${secs}</span>초 내 판단하라. 늦으면 몸이 멋대로 움직인다.</div>
   <div style="margin-top:12px;white-space:pre-line">${esc(ev.t)}</div>`;
  renderChoices(ev);
  let left=secs;
  const fill=txt.querySelector(".tfill"),cnt=txt.querySelector(".alert-count");
  timers.push(setInterval(()=>{
    left--;cnt.textContent=left;fill.style.width=(left/secs*100)+"%";
    if(left<=0){clearTimers();choose(ev,ev.c[ev.to??ev.c.length-1]);}
  },1000));
}
function renderTiming(ev){
  const txt=$("ev-text"),box=$("ev-choices");
  txt.innerHTML=`<div style="white-space:pre-line">${esc(ev.t)}</div>
   <div class="gauge"><span class="zone good" style="left:30%;width:40%"></span><span class="zone perfect" style="left:45%;width:10%"></span><span class="needle" style="left:0"></span></div>
   <div class="gauge-hint mono">초록 = PERFECT / 노랑 = GOOD / 회색 = 실패</div>`;
  const needle=txt.querySelector(".needle");
  let pos=0,dir=1;
  timers.push(setInterval(()=>{
    pos+=dir*2.4;
    if(pos>=98){pos=98;dir=-1;}if(pos<=0){pos=0;dir=1;}
    needle.style.left=pos+"%";
  },16));
  box.innerHTML="";
  const b=document.createElement("button");
  b.className="primary";b.textContent="■ STOP";
  b.onclick=()=>{
    clearTimers();
    const center=pos+2;
    const r=center>=45&&center<=57?ev.perfect:center>=30&&center<=72?ev.good:ev.miss;
    choose(ev,{l:"",fx:r.fx,m:r.m});
  };
  box.appendChild(b);
  b.focus();
}

function showResult(msg,fxText,next){
  clearTimers();
  renderStats();
  const box=$("ev-choices");box.innerHTML="";
  const log=$("fx-log");
  log.style.display="block";
  log.innerHTML=`<span class="msg">${msg.replace(/\n/g,"<br>")}</span>${fxText?`<br><br>▶ ${fxText}`:""}`;
  // 남은 요일 흐름 연출
  const days=["화","수","목","금"];
  const picks=[...WEEK_FLAVOR].sort(()=>Math.random()-.5).slice(0,2+Math.floor(Math.random()*2));
  const wl=document.createElement("div");wl.className="week-log";
  picks.forEach((f,idx)=>{
    const d=document.createElement("div");
    d.textContent=`${days[idx]}요일 — ${f}`;
    d.style.animationDelay=(.4+idx*.45)+"s";
    wl.appendChild(d);
  });
  log.appendChild(wl);
  const b=document.createElement("button");
  b.className="primary";b.textContent="다음 주 →";
  b.onclick=next;
  box.appendChild(b);
  b.focus();
}

function showEnding(e,isNew){
  const kinds={happy:"HAPPY ENDING",sad:"SAD ENDING",byung:"병맛 ENDING"};
  $("end-kind").textContent=kinds[e.kind];
  const t=$("end-title");t.textContent=e.title;
  t.className="ending-title "+(e.kind==="byung"?"byung":e.kind);
  $("end-new").innerHTML=isNew?`<span class="ending-new">NEW! 도감 등록</span>`:"";
  $("end-epi").textContent=e.epi;
  show("scr-ending");
  refreshTitle();
}

function renderDex(){
  const owned=getDex();
  $("dex-head").textContent=`엔딩 도감 — ${owned.length} / ${ENDINGS.length}`;
  const g=$("dex-grid");g.innerHTML="";
  const kinds={happy:"HAPPY",sad:"SAD",byung:"병맛"};
  ENDINGS.forEach(e=>{
    const has=owned.includes(e.id);
    g.insertAdjacentHTML("beforeend",
     has?`<div class="dex-item"><div class="k mono" style="color:${e.kind==='happy'?'#1e7a45':e.kind==='sad'?'#456':'var(--stamp)'}">${kinds[e.kind]}</div><div class="t">${e.title}</div></div>`
        :`<div class="dex-item locked"><div class="k mono">???</div><div class="t">미발견 엔딩</div></div>`);
  });
  show("scr-dex");
}

function refreshTitle(){
  $("dex-count").textContent=`(${getDex().length}/${ENDINGS.length})`;
  $("btn-continue").disabled=!loadSave();
}

/* ---------- 시작 ---------- */
function startNew(){S=newState();save();renderTurn();}
function startContinue(){const d=loadSave();if(!d)return;S=d;renderTurn();}

$("btn-new").onclick=()=>{
  if(loadSave()&&!confirm("진행 중인 게임이 있습니다. 새로 시작하면 사라집니다. 계속할까요?"))return;
  startNew();
};
$("btn-continue").onclick=startContinue;
$("btn-dex").onclick=renderDex;
$("btn-dex-back").onclick=()=>{refreshTitle();show("scr-title");};
$("btn-retry").onclick=startNew;
$("btn-to-title").onclick=()=>{refreshTitle();show("scr-title");};

refreshTitle();

/* ---------- 개발용 치트 ---------- */
window.debug={
  set(k,v){S.stats[k]=v;renderStats();},
  turn(t){S.turn=t;renderTurn();},
  end(id){finish(id);},
  state(){return S;}
};
</script>
</body>
</html>
